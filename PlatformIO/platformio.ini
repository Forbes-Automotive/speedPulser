[platformio]
src_dir = src
include_dir = include
data_dir = data
build_dir = .pio/build

[env:lolin_c3_mini]
platform = espressif32 @ 5.4.0
board = lolin_c3_mini
framework = arduino
monitor_speed = 115200

; Target settings for ESP32-C3/LOLIN C3
board_build.mcu = esp32c3
board_build.f_cpu = 160000000L
board_build.f_flash = 80000000L
board_build.flash_mode = dio

; Partition scheme for OTA updates
board_build.partitions = default.csv
board_build.filesystem = littlefs

; Libraries (compatible with platform 5.4.0)
; Using PlatformIO registry IDs for reliable resolution
lib_deps = 
    RobTillaart/RunningMedian
    plerup/espsoftwareserial
    me-no-dev/ESPAsyncWebServer
    bblanchon/ArduinoJson
    me-no-dev/AsyncTCP

; Build flags
build_flags = 
    -D CORE_DEBUG_LEVEL=0
    -D ARDUINO_LOOP_STACK_SIZE=8192
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D serialDebug=1
    -D serialDebugWifi=1

; Monitor port (auto-detect)
monitor_port = COM*
monitor_filters = direct

; Upload over serial (USB CDC/UART)
upload_protocol = esptool
upload_speed = 921600

; OTA configuration (optional)
; upload_protocol = espota
; upload_port = 192.168.1.x
; upload_flags = --auth=password

; Debug settings (optional, uncomment for debugging)
; debug_tool = esp-prog
; debug_init_break = tbreak setup

; Testing (optional)
; test_dir = test
